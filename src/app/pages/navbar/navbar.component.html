<nav class="fixed top-0 w-full backdrop-blur-lg bg-white/70 dark:bg-gray-900/70 z-50 transition-all duration-300">

  <div class="absolute bottom-0 left-0 w-full h-[3px] bg-transparent pointer-events-none">
    <div
      class="relative h-full bg-gradient-to-r from-blue-400/50 to-blue-600 dark:from-blue-700/50 dark:to-blue-400 transition-all duration-75 ease-out shadow-[0_0_8px_rgba(37,99,235,0.6)]"
      [style.width.%]="scrollProgress">
      <div class="transition-opacity duration-300" [ngClass]="{'opacity-100': isScrolling, 'opacity-0': !isScrolling}">
        <div
          class="absolute top-0 right-0 h-full w-20 bg-gradient-to-r from-transparent to-white/60 dark:to-white/40 animate-pulse">
        </div>
        <div
          class="absolute top-0 right-0 h-full w-[2px] bg-white shadow-[0_0_12px_4px_rgba(255,255,255,0.9)] dark:shadow-[0_0_12px_4px_rgba(96,165,250,0.9)] rounded-full">
        </div>
      </div>
    </div>
  </div>

  <div class="container mx-auto px-4 py-4">
    <div class="flex justify-between items-center">
      <div class="flex items-center space-x-6 sm:space-x-8 ml-auto">

        <a routerLink="/" routerLinkActive="text-gray-900 dark:text-white"
          class="text-sm font-medium transition-colors text-gray-600 dark:text-gray-400"
          [routerLinkActiveOptions]="{ exact: true }">
          Home
        </a>

        <a routerLink="/projects" routerLinkActive="text-gray-900 dark:text-white"
          class="text-sm font-medium transition-colors text-gray-600 dark:text-gray-400"
          [routerLinkActiveOptions]="{ exact: true }">
          Projects
        </a>

        <div class="flex items-center gap-4 border-l border-gray-300 dark:border-gray-700 pl-4 sm:pl-6">
          <span
            class="text-sm font-bold text-blue-600 dark:text-blue-400 w-9 text-right tabular-nums transition-opacity duration-300"
            [ngClass]="{'opacity-0': scrollProgress === 0, 'opacity-100': scrollProgress > 0}">
            {{ scrollProgress }}%
          </span>

          <button (click)="toggleTheme()"
            class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors flex-shrink-0"
            aria-label="Toggle theme">
            <img [ngSrc]="moonIconUrl" alt="Moon" class="w-8 h-8" decoding="async" title="Switch to Dark Mode"
              height="32" width="32" fetchpriority="high" priority [hidden]="isDark">
            <img [ngSrc]="sunIconUrl" alt="Sun" class="w-8 h-8" decoding="async" title="Switch to Light Mode"
              height="32" width="32" fetchpriority="high" priority [hidden]="!isDark">
          </button>
        </div>

      </div>
    </div>
  </div>
</nav>
